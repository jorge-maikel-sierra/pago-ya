# =============================================================================
# Render Blueprint — Pago Ya
# Infraestructura como código para despliegue automático en Render.com
# Docs: https://render.com/docs/blueprint-spec
#
# Servicios definidos:
#   1. pago-ya-web  → Web Service (Express + Node.js 20) — plan free
#
# Base de datos: Prisma Postgres (capa gratuita)
#   → DATABASE_URL se ingresa manualmente desde console.prisma.io
#
# Redis: desactivado — se activará cuando se migre a un plan de pago.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Web Service — Aplicación Express
  # ---------------------------------------------------------------------------
  - type: web
    name: pago-ya-web
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeployTrigger: commit   # Auto-deploy en cada push a main

    # --- Build & Start -------------------------------------------------------
    buildCommand: npm install && npm run build:css && npm run db:generate
    startCommand: npm start

    # Pre-deploy: migraciones de base de datos (zero-downtime)
    preDeployCommand: npm run db:migrate:prod

    # --- Health Check --------------------------------------------------------
    healthCheckPath: /api/health

    # --- Variables de entorno ------------------------------------------------
    envVars:
      - key: NODE_ENV
        value: production

      # Prisma Postgres — copiar la connection string desde console.prisma.io
      # No incluir aquí el valor real; ingresarlo en el dashboard de Render.
      - key: DATABASE_URL
        sync: false

      # Secretos generados automáticamente por Render al crear el Blueprint
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true

      # Telegram — ingresar en el dashboard de Render si se usa
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

      # Parámetros financieros (ajustar según regulación local)
      - key: USURY_RATE_ANNUAL
        value: "0.36"
      - key: DEFAULT_MORA_RATE_ANNUAL
        value: "0.12"

      # CORS — URL pública del servicio: https://pago-ya-web.onrender.com
      - key: CORS_ORIGIN
        sync: false
